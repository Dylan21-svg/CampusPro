{% extends "base.html" %}

{% block content %}
<div class="p-10">
    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Financial Management</h1>
            <p class="text-gray-500 mt-1">Manage school fees and collection tracking</p>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
        <!-- Fee Creation -->
        <div class="bg-white p-8 rounded-3xl shadow-card">
            <h3 class="text-xl font-bold mb-6">Create Fee Item</h3>
            <form action="/admin/fees" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Title</label>
                    <input type="text" name="title" placeholder="e.g. 2nd Semester Tuition" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-primary outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Amount ($)</label>
                    <input type="number" name="amount" placeholder="0.00" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-primary outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Category</label>
                    <select name="type" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-primary outline-none">
                        <option value="Tuition">Tuition</option>
                        <option value="Laboratory">Laboratory</option>
                        <option value="Library">Library</option>
                        <option value="Registration">Registration</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-primary text-white py-4 rounded-2xl font-bold hover:shadow-lg transition duration-300">Publish Fee</button>
            </form>
        </div>

        <!-- Fees Overview Table -->
        <div class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-card">
            <h3 class="text-xl font-bold mb-6">Active Fees</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                            <th class="pb-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        {% for fee in fees %}
                        <tr class="group hover:bg-gray-50 transition duration-150">
                            <td class="py-5 font-bold text-gray-800">{{ fee.title }}</td>
                            <td class="py-5 text-gray-500 text-sm"><span class="bg-gray-100 px-3 py-1 rounded-lg">{{ fee.type }}</span></td>
                            <td class="py-5 font-semibold text-primary">${{ "{:,.2f}".format(fee.amount) }}</td>
                            <td class="py-5 text-right space-x-3">
                                <button onclick="openEditFee('{{ fee.id }}', '{{ fee.title }}', '{{ fee.amount }}')" class="text-indigo-400 hover:text-indigo-600 font-bold text-xs uppercase">Edit</button>
                                <a href="/admin/delete_fee/{{ fee.id }}" class="text-red-400 hover:text-red-600 font-bold text-xs uppercase" onclick="return confirm('Delete fee?')">Remove</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</div>

<!-- Edit Fee Modal -->
<div id="edit-fee-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-lg rounded-[3rem] p-10 shadow-2xl">
        <h3 class="text-2xl font-black mb-8">Edit Fee Item</h3>
        <form id="edit-fee-form" action="" method="POST" class="space-y-4">
            <input type="text" name="title" id="edit-fee-title" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-primary" required>
            <input type="number" name="amount" id="edit-fee-amount" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-primary" required>
            <div class="flex gap-4 pt-4">
                <button type="button" onclick="document.getElementById('edit-fee-modal').classList.add('hidden')" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold">Cancel</button>
                <button type="submit" class="flex-1 bg-primary text-white py-4 rounded-2xl font-bold shadow-lg">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openEditFee(id, title, amount) {
        document.getElementById('edit-fee-form').action = '/admin/edit_fee/' + id;
        document.getElementById('edit-fee-title').value = title;
        document.getElementById('edit-fee-amount').value = amount;
        document.getElementById('edit-fee-modal').classList.remove('hidden');
    }
</script>
{% endblock %}
